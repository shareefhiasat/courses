services:
  mongodb:
    image: mongo:7.0
    container_name: courses-mongodb
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: lms_dev
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ./setup-replica-set.js:/docker-entrypoint-initdb.d/setup-replica-set.js:ro
    networks:
      - courses-network
    restart: always

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  courses-network:
    driver: bridge
