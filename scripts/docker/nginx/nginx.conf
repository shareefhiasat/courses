# Nginx configuration for Military LMS Development
# Acts as reverse proxy with SSL termination
# Proxies to localhost services (backend/frontend run outside docker)

events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=500r/s;

    # HTTP server - redirect to HTTPS
    server {
        listen 80;
        server_name localhost;

        # Redirect all HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Main HTTPS server (Frontend + Backend API) ───────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        # SSL certificates (mounted from volume)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # SSL security settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Backend API - running on host machine
        location /api/ {
            limit_req zone=api burst=100 nodelay;

            proxy_pass https://host.docker.internal:8001/api/;
            proxy_http_version 1.1;
            proxy_set_header Host host.docker.internal;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSL verification off for self-signed certs
            proxy_ssl_verify off;

            # Increase timeout for large file uploads
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            client_max_body_size 50M;
        }

        # Health check endpoint
        location /health {
            proxy_pass https://host.docker.internal:8001/api/health;
            proxy_set_header Host host.docker.internal;
            proxy_ssl_verify off;
            access_log off;
        }

        # Frontend (React/Vite) - running on host machine
        # Must be LAST to catch all other routes
        location / {
            limit_req zone=general burst=1000 nodelay;

            proxy_pass https://host.docker.internal:5174;
            proxy_http_version 1.1;
            # Send the REAL host Vite expects (it validates this)
            proxy_set_header Host localhost:5174;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSL verification off for self-signed certs
            proxy_ssl_verify off;

            # Vite HMR WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;

            proxy_read_timeout 86400s;
        }

        # Error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ─── Keycloak HTTPS proxy (port 8443 → Keycloak :8080 internal) ───────────
    server {
        listen 8443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Keycloak 26+ uses root paths (no /auth prefix)
        location / {
            proxy_pass http://keycloak:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8443;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }
    }

    # ─── Nextcloud HTTPS proxy (port 8086 → Nextcloud :8085 internal) ─────────
    server {
        listen 8086 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 10G;

        location / {
            proxy_pass http://nextcloud:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8086;
            proxy_read_timeout 300s;
        }
    }
}
