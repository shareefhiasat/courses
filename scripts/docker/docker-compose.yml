version: '3.8'

# Unified Docker Compose for Military LMS Development
# All services on a single network for easy communication
# Source of truth for docker configuration

services:
  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: lms-nginx
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"   # Keycloak HTTPS proxy
      - "8086:8086"   # Nextcloud HTTPS proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - keycloak
      - nextcloud
    networks:
      - lms-network
    restart: unless-stopped

  # PostgreSQL Database (App - Prisma schema)
  app-db:
    image: postgres:15-alpine
    container_name: lms-app-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=military_lms
      - POSTGRES_USER=military_lms
      - POSTGRES_PASSWORD=military_lms123
    ports:
      - "5432:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U military_lms -d military_lms"]
      interval: 10s
      timeout: 5s
      retries: 5


  # PostgreSQL Database (Nextcloud)
  nextcloud-db:
    image: postgres:16-alpine
    container_name: lms-nextcloud-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud123
    volumes:
      - nextcloud_db_data:/var/lib/postgresql/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud -d nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache and Session Storage
  redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Nextcloud Redis
  nextcloud-redis:
    image: redis:7-alpine
    container_name: lms-nextcloud-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "redis-nextcloud-123"]
    volumes:
      - nextcloud_redis_data:/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis-nextcloud-123", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage (File Storage)
  minio:
    image: minio/minio:latest
    container_name: lms-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    networks:
      - lms-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Keycloak Authentication Service
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: lms-keycloak
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin123
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://host.docker.internal:5433/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak123
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_PORT=8080
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_SPI_X509_ENABLED=false
      - KEYCLOAK_EXTRA_ARGS="--http-enabled=true --hostname-strict=false"
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin123
    networks:
      - lms-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./keycloak-setup:/opt/keycloak/data/import
    command: ["start-dev"]
    healthcheck:
      test: ["CMD-SHELL", "exec", "keycloak", "health", "--server"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nextcloud
  nextcloud:
    image: nextcloud:29-apache
    container_name: lms-nextcloud
    restart: unless-stopped
    ports:
      - "8085:80"
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud123
      - REDIS_HOST=nextcloud-redis
      - REDIS_HOST_PASSWORD=redis-nextcloud-123
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin123
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost 127.0.0.1 nextcloud
      - NEXTCLOUD_OVERWRITEPROTOCOL=http
      - NEXTCLOUD_DATA_DIR=/var/www/html/data
    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_apps:/var/www/html/custom_apps
      - nextcloud_config:/var/www/html/config
      - nextcloud_data:/var/www/html/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Collabora (Nextcloud Office)
  collabora:
    image: collabora/code:24.04.12.3.1
    container_name: lms-collabora
    restart: unless-stopped
    ports:
      - "9980:9980"
    environment:
      - username=admin
      - password=admin123
      - domain=localhost(:[0-9]+)?
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true
    cap_add:
      - MKNOD
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9980/hosting/discovery || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Elasticsearch - Search and Analytics Engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: lms-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Logstash - Log Processing Pipeline
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: lms-logstash
    restart: unless-stopped
    ports:
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
      - ENVIRONMENT=development
    volumes:
      - ../../docker/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ../../docker/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - logstash_data:/usr/share/logstash/data
    networks:
      - lms-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kibana - Data Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: lms-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    networks:
      - lms-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:10.2.0
    container_name: lms-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=
      - GF_PLUGINS_ENABLE_MARKETPLACE=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: lms-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MailDev - Email Development Server
  maildev:
    image: maildev/maildev:latest
    container_name: lms-maildev
    restart: unless-stopped
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:1080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Allure Test Reporting Dashboard
  allure:
    image: frankescobar/allure-docker-service:latest
    container_name: lms-allure
    restart: unless-stopped
    ports:
      - "5050:5050"
      - "4040:4040"
    environment:
      CHECK_RESULTS_EVERY_SECONDS: 3
      KEEP_HISTORY: 1
      CLEAN_RESULTS_DIR: false
      HOST: 0.0.0.0
      PORT: 5050
    volumes:
      - ../../client/test-results/allure-results:/app/allure-results
      - ../../client/test-results/allure-reports:/app/default-reports
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5050/allure-docker-service/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Backend API (Development - not dockerized, run with npm)
  # Uncomment to dockerize backend:
  # backend:
  #   build:
  #     context: ../../backend
  #     dockerfile: Dockerfile.dev
  #   container_name: lms-backend
  #   environment:
  #     NODE_ENV: development
  #     PORT: 8001
  #     DATABASE_URL: postgresql://military_lms:military_lms123@app-db:5432/military_lms
  #     NEXTCLOUD_BASE_URL: http://nextcloud:80
  #     NEXTCLOUD_USERNAME: admin
  #     NEXTCLOUD_APP_PASSWORD: admin123
  #     KEYCLOAK_URL: http://keycloak:8080
  #     KEYCLOAK_REALM: military-lms
  #     CORS_ORIGIN: https://localhost
  #     FRONTEND_URL: https://localhost
  #   ports:
  #     - "8001:8001"
  #   depends_on:
  #     - app-db
  #   networks:
  #     - lms-network
  #   restart: unless-stopped

  # Frontend (Development - not dockerized, run with pnpm)
  # Uncomment to dockerize frontend:
  # frontend:
  #   build:
  #     context: ../../client
  #     dockerfile: Dockerfile.dev
  #   container_name: lms-frontend
  #   environment:
  #     VITE_API_URL: https://localhost/api/v1
  #     VITE_API_BASE_URL: https://localhost
  #     VITE_WS_URL: wss://localhost
  #     VITE_KEYCLOAK_URL: http://keycloak:8080
  #     VITE_KEYCLOAK_REALM: military-lms
  #   ports:
  #     - "5174:5174"
  #   depends_on:
  #     - backend
  #   networks:
  #     - lms-network
  #   restart: unless-stopped

volumes:
  app_db_data:
    driver: local
  keycloak_db_data:
    driver: local
  nextcloud_db_data:
    driver: local
  nextcloud_redis_data:
    driver: local
  nextcloud_html:
    driver: local
  nextcloud_apps:
    driver: local
  nextcloud_config:
    driver: local
  nextcloud_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  elasticsearch_data:
    driver: local
  logstash_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  lms-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
