parent=base
import=common/keycloak
locales=en,ar

# Load PatternFly CSS for base styling
stylesCommon=vendor/patternfly-v4/patternfly.min.css vendor/patternfly-v3/css/patternfly.min.css vendor/patternfly-v3/css/patternfly-additions.min.css lib/pficon/pficon.css

# Custom branding - load our CSS (Keycloak resolves from resources/)
styles=css/login.css

# Load custom script to change locale labels
scripts=js/locale-labels.js

# PatternFly class mappings
kcHtmlClass=login-pf
kcLoginClass=login-pf-page
kcFormCardClass=card-pf
kcFormHeaderClass=login-pf-header
kcFormClass=form-horizontal
kcFormGroupClass=form-group
kcLabelClass=control-label
kcInputClass=form-control
kcFormOptionsClass=login-pf-settings
kcFormButtonsClass=form-group
kcButtonClass=pf-c-button
kcButtonPrimaryClass=pf-m-primary
kcButtonBlockClass=pf-m-block
kcButtonLargeClass=btn-lg
kcInputLargeClass=input-lg
