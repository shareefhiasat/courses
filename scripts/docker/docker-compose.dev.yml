services:
  # Redis Cache and Session Storage
  redis:
    image: redis:7-alpine
    container_name: lms-qaf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_dev_data:/data
    networks:
      - lms-qaf
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # MinIO Object Storage (File Storage)
  minio:
    image: minio/minio:latest
    container_name: lms-qaf-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_dev_data:/data
    networks:
      - lms-qaf
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # PostgreSQL Database (for Keycloak only)
  keycloak-db:
    image: postgres:15-alpine
    container_name: lms-qaf-keycloak-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak123
    ports:
      - "5433:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - lms-qaf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database (for the app - Prisma schema)
  app-db:
    image: postgres:15-alpine
    container_name: lms-qaf-app-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=military_lms
      - POSTGRES_USER=military_lms
      - POSTGRES_PASSWORD=military_lms123
    ports:
      - "5432:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    networks:
      - lms-qaf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U military_lms -d military_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak Authentication Service
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: lms-qaf-keycloak
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin123
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak123
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_PORT=8080
      - KC_HTTP_ENABLED=true
      # CORS and CSP fixes for development
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_SPI_X509_ENABLED=false
      - KEYCLOAK_EXTRA_ARGS="--http-enabled=true --hostname-strict=false --spi-theme--cache-themes=false --spi-theme--cache-templates=false --spi-theme--static-max-age=-1"
      # Auto-configure client with redirect URIs
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin123
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - lms-qaf
    volumes:
      - ./keycloak-setup:/opt/keycloak/data/import
      - ./keycloak-setup/themes/military-lms:/opt/keycloak/themes/military-lms
    command: ["start-dev"]
    healthcheck:
      test: ["CMD-SHELL", "exec", "keycloak", "health", "--server"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Elasticsearch - Search and Analytics Engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: lms-qaf-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - lms-qaf
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Logstash - Log Processing Pipeline
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: lms-qaf-logstash
    restart: unless-stopped
    ports:
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
      - ENVIRONMENT=development
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - logstash_data:/usr/share/logstash/data
    networks:
      - lms-qaf
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kibana - Data Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: lms-qaf-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    networks:
      - lms-qaf
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:10.2.0
    container_name: lms-qaf-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=
      - GF_PLUGINS_ENABLE_MARKETPLACE=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - lms-qaf
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: lms-qaf-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - lms-qaf
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MailDev - Email Development Server
  maildev:
    image: maildev/maildev:latest
    container_name: lms-qaf-maildev
    restart: unless-stopped
    ports:
      - "1080:1080"  # Web interface
      - "1025:1025"  # SMTP server
    networks:
      - lms-qaf
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:1080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Allure Test Reporting Dashboard
  allure:
    image: frankescobar/allure-docker-service:latest
    container_name: lms-qaf-allure
    restart: unless-stopped
    ports:
      - "5050:5050"  # Allure UI
      - "4040:4040"  # Allure API
    environment:
      CHECK_RESULTS_EVERY_SECONDS: 3
      KEEP_HISTORY: 1
      CLEAN_RESULTS_DIR: false
      HOST: 0.0.0.0
      PORT: 5050
      SECURITY_USER: ""
      SECURITY_PASS: ""
      SECURITY_ENABLED: false
      ALLURE_PROJECT_NAME: lms-e2e
    volumes:
      - ../../client/allure-results:/app/allure-results
      - ../../client/test-results/reports/allure-report:/app/default-reports
    networks:
      - lms-qaf
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5050/allure-docker-service/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  redis_dev_data:
    driver: local
  minio_dev_data:
    driver: local
  keycloak_db_data:
    driver: local
  app_db_data:
    driver: local
  elasticsearch_data:
    driver: local
  logstash_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  lms-qaf:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
