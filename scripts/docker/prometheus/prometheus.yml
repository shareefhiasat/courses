global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'military-lms'
    environment: 'development'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node.js API Server metrics (if you add prom-client)
  - job_name: 'api-server'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # MongoDB metrics (if you add mongodb-exporter)
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']

  # Redis metrics (if you add redis-exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Docker container metrics (if you add cadvisor)
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']
