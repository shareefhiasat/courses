input {
  # TCP input for Winston logger
  tcp {
    port => 5000
    codec => json_lines
    type => "winston"
  }

  # UDP input (optional)
  udp {
    port => 5000
    codec => json_lines
    type => "winston"
  }

  # Beats input (for future use)
  beats {
    port => 5044
  }
}

filter {
  # Parse Winston logs
  if [type] == "winston" {
    # Add timestamp if not present
    if ![timestamp] {
      mutate {
        add_field => { "timestamp" => "%{@timestamp}" }
      }
    }

    # Parse log level
    if [level] {
      mutate {
        uppercase => [ "level" ]
      }
    }

    # Add application metadata
    mutate {
      add_field => {
        "application" => "military-lms"
        "environment" => "${ENVIRONMENT:development}"
      }
    }

    # Parse error stack traces
    if [error] {
      mutate {
        add_tag => [ "error" ]
      }
    }

    # Parse API request logs
    if [method] and [url] {
      mutate {
        add_tag => [ "api-request" ]
      }
    }

    # Parse database operation logs
    if [operation] and [collection] {
      mutate {
        add_tag => [ "database-operation" ]
      }
    }
  }

  # Grok patterns for unstructured logs
  grok {
    match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:log_message}" }
    tag_on_failure => [ "_grokparsefailure" ]
  }

  # Date parsing
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  # Remove unnecessary fields
  mutate {
    remove_field => [ "host", "port" ]
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "lms-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
