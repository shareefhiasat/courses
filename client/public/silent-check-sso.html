<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Silent Check SSO</title>
</head>
<body>
    <script>
        // Standard Keycloak silent-check-sso.html
        // This page receives the authentication response from Keycloak
        // and passes it back to the parent window via postMessage
        window.onload = function() {
            // Parse the URL hash/params to get the auth response
            var hash = window.location.hash;
            if (hash && hash.length > 0) {
                // Send the auth response to the parent window
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage(hash.substring(1), window.location.origin);
                }
            }
        };
    </script>
</body>
</html>
