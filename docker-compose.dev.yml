version: '3.8'

services:
  # MongoDB Database (Primary Data Store)
  mongodb:
    image: mongo:7.0
    container_name: courses-mongodb
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=lms_dev
    volumes:
      - mongodb_dev_data:/data/db
      - mongodb_dev_config:/data/configdb
      - ./scripts/mongo-replica-set.js:/docker-entrypoint-initdb.d/mongo-replica-set.js:ro
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "try { rs.status() } catch(err) { rs.initiate() }"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Redis Cache and Session Storage
  redis:
    image: redis:7-alpine
    container_name: courses-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_dev_data:/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # MinIO Object Storage (File Storage)
  minio:
    image: minio/minio:latest
    container_name: courses-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_dev_data:/data
    networks:
      - lms-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # PostgreSQL Database (for Keycloak only)
  keycloak-db:
    image: postgres:15-alpine
    container_name: courses-keycloak-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak123
    ports:
      - "5432:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak Authentication Service
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: courses-keycloak
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin123
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak123
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_PORT=8080
      - KC_HTTP_ENABLED=true
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - lms-network
    command: ["start-dev"]
    healthcheck:
      test: ["CMD-SHELL", "exec", "keycloak", "health", "--server"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_dev_data:
    driver: local
  mongodb_dev_config:
    driver: local
  redis_dev_data:
    driver: local
  minio_dev_data:
    driver: local
  keycloak_db_data:
    driver: local

networks:
  lms-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
